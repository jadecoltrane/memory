# 兜底:工作台日更 / 每周 Memory GC 遇到模型 API 或 runner 的瞬时故障时自动重跑。
# Codex 步骤不负责提交;待裁决 issue 按日期去重,所以重跑可安全恢复。
# run_attempt < 3 防死循环。
name: 失败自动重跑

on:
  workflow_run:
    workflows: ["工作台日更", "每周 Memory GC"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: 等 3 分钟避开瞬时故障后重跑失败的任务
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 180
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
