# 兜底:工作台日更 / 每周 Memory GC 偶发在启动阶段死于 Anthropic token 交换的
# 401 误报("User does not have write access on this repository"),同一配置
# 时好时坏,重跑即可恢复(见 pitfalls/云端Claude工作流会偶发401权限误报重跑即可不用改配置.md)。
# 失败发生在 Claude 干活之前、零副作用,所以自动重跑安全;run_attempt < 3 防死循环。
name: 失败自动重跑

on:
  workflow_run:
    workflows: ["工作台日更", "每周 Memory GC"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: 等 3 分钟避开瞬时故障后重跑失败的任务
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 180
          gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
