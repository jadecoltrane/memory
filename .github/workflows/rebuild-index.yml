name: 自动重建记忆索引

on:
  push:
    branches: [main]
    paths:
      - "profile/**"
      - "concepts/**"
      - "decisions/**"
      - "pitfalls/**"
      - "insights/**"
      - "questions/**"
      - "notes/**"

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 重新生成 meta/index.md
        run: python3 scripts/build_memory_index.py

      - name: 有变化就提交推送
        run: |
          git config user.name "memory-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- meta/index.md; then
            git add meta/index.md
            git commit -m "自动重建记忆索引"
            git push
          fi
